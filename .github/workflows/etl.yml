name: ETL CNO (Serra Gaúcha)

# Roda na nuvem (runner do GitHub). Credenciais vêm de Secrets, nunca do código.
# mode=introspect  -> descobre o schema do CNO no BigQuery (1º passo)
# mode=load        -> carga real filtrada pela Serra Gaúcha no Supabase

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "introspect ou load"
        type: choice
        default: introspect
        options:
          - introspect
          - load

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Gravar credencial GCP
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp.json"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Rodar ETL (${{ github.event.inputs.mode }})
        run: |
          ./node_modules/.bin/esbuild "etl/${MODE}.ts" \
            --bundle --platform=node --format=cjs --packages=external \
            --outfile=.etl.cjs
          node .etl.cjs
        env:
          MODE: ${{ github.event.inputs.mode }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp.json
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
